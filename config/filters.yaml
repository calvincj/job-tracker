# Tune these freely. A job must match keywords_any AND (locations_any OR remote
# OR unknown location), and must NOT contain an exclude_title term (whole-word).

# Note: the digest/dashboard show every currently-open match, full stop - no
# rolling time window. "New today" (dashboard) is its own thing: genuinely new
# to the tracker, or the source's own posted date is today.

# Title must contain at least one of these (case-insensitive substring).
# "analyst" and "data" used to be here but got dropped - they're generic enough
# to match any domain (bioinformatics, HR, healthcare data) with zero sector
# signal, and were the main source of off-target noise.
keywords_any:
  - energy
  - clean
  - climate
  - renewable
  - grid
  - power
  - solar
  - wind
  - battery
  - storage
  - sustainab       # sustainable, sustainability
  - decarbon
  - transition
  - policy
  - regulat
  - supply chain
  - procurement
  - econom          # economist, economics
  - strategy
  - consultant
  - research
  - infrastructure
  - utility
  - carbon
  - critical mineral
  - rare earth
  - lithium
  - battery materials
  - mining
  - magnet
  - mineral

# Location must contain one of these, OR the job is remote. Big US cities +
# San Diego (for school-year roles). Add or trim as you like.
locations_any:
  - remote
  - san diego
  - san francisco
  - bay area
  - los angeles
  - new york
  - washington
  - boston
  - chicago
  - seattle
  - austin
  - houston
  - denver
  - atlanta
  - philadelphia
  - dallas

# Drop senior / leadership roles you can't apply to as an undergrad.
exclude_title:
  - senior
  - sr.
  - staff
  - principal
  - director
  - vp
  - vice president
  - head of
  - chief
  - lead
  - manager
  - phd
  - postdoc              # requires an already-completed PhD
  - postdoctoral
  - doctoral
  - expert              # "X Expert" titles are consistently senior/specialist
  - managing consultant # a specific rung above plain "Consultant" at firms
                         # like Guidehouse/Deloitte, not an entry title
  # "ii" / "iii" removed: utility career ladders (Duke, etc.) use Analyst
  # I/II/III and Engineer I/II/III as their normal entry-to-mid grades, so
  # excluding "ii"/"iii" silently hid near-entry roles. Recall > noise here.

  # Not your field - healthcare/clinical consulting practice roles (Guidehouse
  # etc. run large healthcare practices that otherwise pass on "consultant").
  - healthcare
  - health care
  - clinical
  - patient
  - medical
  - hospital
  - physician
  - nursing
  - pharma
  - oncology
  - epidemiology
  - epidemiologist
  - bioinformatics
  - biomedical
  - dental
  - veterinary
  - revenue cycle
  - public health

# Best-effort: drop a job if its own description states a minimum years of
# experience above this. Only checked for sources that give us the full
# description for free (Greenhouse, Ashby) - others are left unfiltered on
# this dimension since we have nothing to check (recall > false confidence).
max_years_experience: 3

# One-off patches for specific postings our automatic dead-link check can't
# catch (e.g. Ashby's list API says a job is live while its own detail page
# renders "not found" - a client-side SPA quirk, not something an HTTP status
# check can see). uid format is {source}:{company}:{job_id}, e.g.
# "ashby:Form Energy:...". Add here if the same broken link keeps recurring.
known_dead_uids:
  - "ashby:Form Energy:5592f375-8718-4d2e-9617-3ee6a044ebd0"  # Supply Chain Logistics Analyst - Ashby list/detail mismatch

# Role-type tagging drives how the digest is grouped.
role_types:
  intern:
    - intern
    - internship
    - co-op
    - co op
    - coop
  new_grad:
    - new grad
    - new graduate
    - entry level
    - entry-level
    - university
    - campus
    - early career
    - associate
    - analyst        # entry title in consulting/finance
    - consultant     # bare "Consultant" (not "Managing/Senior Consultant",
                      # both excluded above) is the entry rung at firms like
                      # Guidehouse/ICF

# Optional broad net for the many big firms with no clean ATS API.
# Requires free Adzuna keys as env vars ADZUNA_APP_ID / ADZUNA_APP_KEY.
adzuna:
  enabled: true      # only fires if ADZUNA_APP_ID/ADZUNA_APP_KEY env vars are set
  queries:
    - what: clean energy analyst
      where: ""
    - what: energy policy analyst
      where: ""
    - what: sustainability consultant
      where: ""
    - what: supply chain analyst
      where: ""
    - what: renewable energy internship
      where: ""
    - what: energy analyst
      where: san diego
    - what: critical minerals
      where: ""
    - what: China industrial policy
      where: ""
    - what: foreign policy research
      where: ""

# Optional: push the digest to your inbox instead of just checking the repo.
# Requires free env vars GMAIL_USER / GMAIL_APP_PASSWORD (+ optional
# DIGEST_TO_EMAIL). See src/notify.py.
delivery:
  email:
    enabled: true

# Optional federal source for the energy-policy track (DOE, FERC, EPA, EIA).
# Free key from https://developer.usajobs.gov/apirequest/. Set env vars
# USAJOBS_KEY and USAJOBS_EMAIL (GitHub secrets).
usajobs:
  enabled: true
  keywords:
    - energy policy
    - clean energy
    - energy analyst
    - electricity markets
    - climate
    - critical minerals
    - supply chain
